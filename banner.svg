<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58E5FF" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58E5FF;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowL" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#58E5FF;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0d1117"/>

  <!-- Grid -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Glow -->
  <rect width="900" height="280" fill="url(#glow)"/>
  <rect width="900" height="280" fill="url(#glowL)"/>

  <!-- Top border line -->
  <line x1="60" y1="40" x2="840" y2="40" stroke="#58E5FF" stroke-width="0.6" opacity="0.4"/>
  <!-- Bottom border line -->
  <line x1="60" y1="240" x2="840" y2="240" stroke="#58E5FF" stroke-width="0.6" opacity="0.4"/>

  <!-- Corner marks TL -->
  <line x1="40" y1="40" x2="60" y2="40" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="40" y1="40" x2="40" y2="60" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <!-- Corner marks TR -->
  <line x1="860" y1="40" x2="840" y2="40" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="860" y1="40" x2="860" y2="60" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <!-- Corner marks BL -->
  <line x1="40" y1="240" x2="60" y2="240" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="40" y1="240" x2="40" y2="220" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <!-- Corner marks BR -->
  <line x1="860" y1="240" x2="840" y2="240" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="860" y1="240" x2="860" y2="220" stroke="#58E5FF" stroke-width="1.5" opacity="0.9"/>

  <!-- Eyebrow label -->
  <text x="450" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#58E5FF" opacity="0.7" letter-spacing="6">MUMBAI · INDIA · SaaS ENGINEER</text>

  <!-- Main name -->
  <text x="450" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#f0f6fc" letter-spacing="-1">Inderjeet</text>
  <text x="450" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#58E5FF" font-style="italic" letter-spacing="-1">Saluja.</text>

  <!-- Side decorations - left dots -->
  <circle cx="80" cy="140" r="2" fill="#58E5FF" opacity="0.6"/>
  <circle cx="80" cy="155" r="2" fill="#58E5FF" opacity="0.4"/>
  <circle cx="80" cy="170" r="2" fill="#58E5FF" opacity="0.2"/>

  <!-- Side decorations - right dots -->
  <circle cx="820" cy="140" r="2" fill="#58E5FF" opacity="0.6"/>
  <circle cx="820" cy="155" r="2" fill="#58E5FF" opacity="0.4"/>
  <circle cx="820" cy="170" r="2" fill="#58E5FF" opacity="0.2"/>

  <!-- Bottom tagline -->
  <text x="450" y="262" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#484f58" letter-spacing="3">ENGINEER · BUILDER · AUTOMATION OR NOTHING</text>
</svg>
