<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a7db5" stroke-width="0.3" opacity="0.12"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58E5FF;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#f5f8fa;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="280" fill="#f5f8fa"/>
  <rect width="900" height="280" fill="url(#grid)"/>
  <rect width="900" height="280" fill="url(#glow)"/>

  <line x1="60" y1="40" x2="840" y2="40" stroke="#0a7db5" stroke-width="0.6" opacity="0.35"/>
  <line x1="60" y1="240" x2="840" y2="240" stroke="#0a7db5" stroke-width="0.6" opacity="0.35"/>

  <line x1="40" y1="40" x2="60" y2="40" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="40" y1="40" x2="40" y2="60" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="860" y1="40" x2="840" y2="40" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="860" y1="40" x2="860" y2="60" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="40" y1="240" x2="60" y2="240" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="40" y1="240" x2="40" y2="220" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="860" y1="240" x2="840" y2="240" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>
  <line x1="860" y1="240" x2="860" y2="220" stroke="#0a7db5" stroke-width="1.5" opacity="0.8"/>

  <!-- Eyebrow — was opacity 0.75, now full colour -->
  <text x="450" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#0a7db5" letter-spacing="6">MUMBAI · INDIA · SaaS ENGINEER</text>

  <text x="450" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#1c2128" letter-spacing="-1">Inderjeet</text>
  <text x="450" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#0a7db5" font-style="italic" letter-spacing="-1">Saluja.</text>

  <circle cx="80" cy="140" r="2" fill="#0a7db5" opacity="0.5"/>
  <circle cx="80" cy="155" r="2" fill="#0a7db5" opacity="0.3"/>
  <circle cx="80" cy="170" r="2" fill="#0a7db5" opacity="0.15"/>
  <circle cx="820" cy="140" r="2" fill="#0a7db5" opacity="0.5"/>
  <circle cx="820" cy="155" r="2" fill="#0a7db5" opacity="0.3"/>
  <circle cx="820" cy="170" r="2" fill="#0a7db5" opacity="0.15"/>

  <!-- Bottom tagline — was #9aa5b4, now darker -->
  <text x="450" y="262" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#4a5568" letter-spacing="3">ENGINEER · BUILDER · AUTOMATION OR NOTHING</text>
